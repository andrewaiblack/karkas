# FIX: IP-based rate limiting zone (prevents scraping / DDoS on landing)
limit_req_zone $binary_remote_addr zone=landing:10m rate=30r/m;

server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # FIX: hide nginx version from Server header (info disclosure)
    server_tokens off;

    # ── Security headers ────────────────────────────────────────────────────
    # FIX: X-Frame-Options — prevents clickjacking
    add_header X-Frame-Options "DENY" always;

    # FIX: X-Content-Type-Options — prevents MIME-sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # FIX: Referrer-Policy — limits info sent to third-party sites
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # FIX: Permissions-Policy — disable unused browser features
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # FIX: Content-Security-Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://rpc.marakyja.xyz https://faucet.marakyja.xyz https://explorer.marakyja.xyz; img-src 'self' data:; font-src 'self'; object-src 'none'; frame-ancestors 'none'; upgrade-insecure-requests;" always;

    # FIX: HSTS — enforce HTTPS (activate only after confirming TLS termination upstream)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        # FIX: rate limit with generous burst for page loads
        limit_req zone=landing burst=20 nodelay;
        try_files $uri $uri/ /index.html;
    }

    # Deny access to hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 256;

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Re-add security headers (add_header doesn't inherit in nested blocks)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
    }
}
