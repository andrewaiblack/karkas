services:
  execution:
    image: ethereum/client-go
    container_name: l1-execution
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data/el:/data
      - ./artifacts/metadata:/testnet
      - ./artifacts/jwt:/jwt
      - ./docker:/scripts:ro
    ports:
      - "${EXECUTION_HTTP_PORT}:${EXECUTION_HTTP_PORT}"
      - "${EXECUTION_WS_PORT}:${EXECUTION_WS_PORT}"
      - "${EXECUTION_P2P_PORT}:${EXECUTION_P2P_PORT}"
    entrypoint: ["/bin/sh", "/scripts/geth.sh"]

  consensus:
    image: sigp/lighthouse
    container_name: l1-consensus
    restart: unless-stopped
    env_file: .env
    depends_on:
      - execution
    volumes:
      - ./data/cl:/data
      - ./artifacts/metadata:/testnet
      - ./artifacts/jwt:/jwt
      - ./docker:/scripts:ro
    ports:
      - "${CONSENSUS_P2P_TCP}:${CONSENSUS_P2P_TCP}"
      - "${CONSENSUS_P2P_UDP}:${CONSENSUS_P2P_UDP}/udp"
      - "${CONSENSUS_HTTP_PORT}:${CONSENSUS_HTTP_PORT}"
      - "${CONSENSUS_METRICS_PORT}:${CONSENSUS_METRICS_PORT}"
    entrypoint: ["/bin/sh", "/scripts/lighthouse-bn.sh"]

  validator:
    image: sigp/lighthouse
    container_name: l1-validator
    restart: unless-stopped
    env_file: .env
    depends_on:
      - consensus
    volumes:
      - ./data/validator:/validator
      - ./artifacts/metadata:/testnet
      - ./docker:/scripts:ro
    entrypoint: ["/bin/sh", "/scripts/lighthouse-vc.sh"]

  faucet:
    build:
      context: ./faucet
    container_name: l1-faucet
    restart: unless-stopped
    volumes:
      - ./faucet/data:/app/data
    env_file:
      - .env
      - .env.local
    environment:
      RPC_URL: http://execution:8545
      FAUCET_CHAIN_ID: ${CHAIN_ID}
    depends_on:
      - execution
    ports:
      - "${FAUCET_PORT}:${FAUCET_PORT}"

  landing:
    build:
      context: ./site
    container_name: l1-landing
    restart: unless-stopped
    ports:
      - "${LANDING_PORT}:3000"
