# ── KARKAS Testnet Stack ─────────────────────────────────────────────────────
# All ports, chain IDs and secrets come from .env (generated by 00-init-secrets.sh)
# Oracle .env is separate: oracle/.env  (copy from oracle/.env.example)
#
# Quick start:
#   bash scripts/00-init-secrets.sh
#   bash scripts/01-generate-genesis.sh
#   bash scripts/02-generate-keys.sh
#   bash scripts/03-init-geth.sh
#   bash scripts/04-init-validator.sh
#   docker compose up -d

services:

  # ── Execution Layer (Geth) ─────────────────────────────────────────────────
  execution:
    image: ethereum/client-go:v1.14.12
    container_name: l1-execution
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data/el:/data
      - ./artifacts/metadata:/testnet:ro
      - ./artifacts/jwt:/jwt:ro
      - ./docker:/scripts:ro
    ports:
      - "${EXECUTION_HTTP_PORT:-8545}:${EXECUTION_HTTP_PORT:-8545}"
      - "${EXECUTION_WS_PORT:-8546}:${EXECUTION_WS_PORT:-8546}"
      - "${EXECUTION_P2P_PORT:-30303}:${EXECUTION_P2P_PORT:-30303}"
    entrypoint: ["/bin/sh", "/scripts/geth.sh"]

  # ── Consensus Layer (Lighthouse Beacon) ────────────────────────────────────
  consensus:
    image: sigp/lighthouse:latest
    container_name: l1-consensus
    restart: unless-stopped
    env_file: .env
    depends_on:
      - execution
    volumes:
      - ./data/cl:/data
      - ./artifacts/metadata:/testnet:ro
      - ./artifacts/jwt:/jwt:ro
      - ./docker:/scripts:ro
    ports:
      - "${CONSENSUS_P2P_TCP:-9000}:${CONSENSUS_P2P_TCP:-9000}"
      - "${CONSENSUS_P2P_UDP:-9000}:${CONSENSUS_P2P_UDP:-9000}/udp"
      - "127.0.0.1:${CONSENSUS_HTTP_PORT:-5052}:${CONSENSUS_HTTP_PORT:-5052}"
      - "127.0.0.1:${CONSENSUS_METRICS_PORT:-5054}:${CONSENSUS_METRICS_PORT:-5054}"
    entrypoint: ["/bin/sh", "/scripts/lighthouse-bn.sh"]

  # ── Validator (Lighthouse VC) ──────────────────────────────────────────────
  validator:
    image: sigp/lighthouse:latest
    container_name: l1-validator
    restart: unless-stopped
    env_file: .env
    depends_on:
      - consensus
    volumes:
      - ./data/validator:/validator
      - ./artifacts/metadata:/testnet:ro
      - ./docker:/scripts:ro
    entrypoint: ["/bin/sh", "/scripts/lighthouse-vc.sh"]

  # ── Faucet ─────────────────────────────────────────────────────────────────
  faucet:
    build:
      context: ./faucet
    container_name: l1-faucet
    restart: unless-stopped
    env_file: .env
    environment:
      RPC_URL: "http://execution:${EXECUTION_HTTP_PORT:-8545}"
      FAUCET_CHAIN_ID: "${CHAIN_ID}"
      PORT: "${FAUCET_PORT:-5000}"
    volumes:
      - ./faucet/data:/app/data
    depends_on:
      - execution
    ports:
      - "127.0.0.1:${FAUCET_PORT:-5000}:${FAUCET_PORT:-5000}"

  # ── Landing + DApps Site (React SPA) ──────────────────────────────────────
  # Routes: / (landing)  /dapps (dapp listing)  /dapps/gembl (roulette)
  # nginx is configured with try_files $uri $uri/ /index.html
  # so all React Router paths work correctly.
  landing:
    build:
      context: ./site
    container_name: l1-landing
    restart: unless-stopped
    ports:
      - "127.0.0.1:${LANDING_PORT:-3000}:3000"

  # ── VRF Oracle ─────────────────────────────────────────────────────────────
  # Listens for RequestRandom events, fulfills spins on-chain.
  # Setup: cp oracle/.env.example oracle/.env
  #        Fill in CONTRACT_ADDRESS and ORACLE_PRIVATE_KEY
  # Deploy contract first: node contracts/deploy.js
  oracle:
    build:
      context: ./oracle
    container_name: l1-oracle
    restart: unless-stopped
    env_file: ./oracle/.env
    environment:
      RPC_URL: "http://execution:${EXECUTION_HTTP_PORT:-8545}"
    depends_on:
      - execution
