server {
  listen 3000;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN";
  add_header X-Content-Type-Options "nosniff";

  # All routes (including /dapps, /dapps/gembl) fall back to index.html
  # This is REQUIRED for React Router — without $uri/ nginx returns 404 on subpaths
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache static assets aggressively (hashed filenames from Vite)
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Never cache index.html so deploys propagate immediately
  location = /index.html {
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;
}
