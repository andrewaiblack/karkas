# Blockscout explorer stack.
# All secrets and network config come from the root .env file.
# Run: docker compose --env-file ../.env up -d
services:
  redis-db:
    image: "redis:alpine"
    container_name: blockscout-redis
    command: redis-server
    volumes:
      - ./redis-data:/data

  db-init:
    image: postgres:17
    volumes:
      - ./blockscout-db-data:/var/lib/postgresql/data
    entrypoint:
      - sh
      - -c
      - chown -R 2000:2000 /var/lib/postgresql/data

  db:
    image: postgres:17
    user: 2000:2000
    shm_size: 256m
    restart: always
    container_name: "blockscout-db"
    command: postgres -c 'max_connections=200' -c 'client_connection_check_interval=60000'
    environment:
      POSTGRES_DB: "blockscout"
      POSTGRES_USER: "blockscout"
      # Password comes from root .env (generated by 00-init-secrets.sh)
      POSTGRES_PASSWORD: "${BLOCKSCOUT_DB_PASSWORD}"
    volumes:
      - ./blockscout-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blockscout -d blockscout"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      db-init:
        condition: service_completed_successfully

  backend:
    image: ghcr.io/blockscout/${DOCKER_REPO:-blockscout}:${DOCKER_TAG:-latest}
    pull_policy: always
    restart: always
    stop_grace_period: 5m
    container_name: "blockscout-backend"
    command: sh -c "bin/blockscout eval \"Elixir.Explorer.ReleaseTasks.create_and_migrate()\" && bin/blockscout start"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # DB connection uses generated password from root .env
      DATABASE_URL: "postgresql://blockscout:${BLOCKSCOUT_DB_PASSWORD}@db:5432/blockscout"
      SECRET_KEY_BASE: "${BLOCKSCOUT_SECRET_KEY_BASE}"
      CHAIN_ID: "${CHAIN_ID}"
      ETHEREUM_JSONRPC_VARIANT: "geth"
      ETHEREUM_JSONRPC_HTTP_URL: "http://host.docker.internal:${EXECUTION_HTTP_PORT:-8545}/"
      ETHEREUM_JSONRPC_TRACE_URL: "http://host.docker.internal:${EXECUTION_HTTP_PORT:-8545}/"
      ETHEREUM_JSONRPC_TRANSPORT: "http"
      ETHEREUM_JSONRPC_DISABLE_ARCHIVE_BALANCES: "false"
      ECTO_USE_SSL: "false"
      BLOCKSCOUT_HOST: "${BASE_DOMAIN}"
      BLOCKSCOUT_PROTOCOL: "https"
      NEXT_PUBLIC_API_HOST: "${BASE_DOMAIN}"
      NEXT_PUBLIC_API_PROTOCOL: "https"
      NEXT_PUBLIC_NETWORK_NAME: "${CURRENCY_NAME}"
      NEXT_PUBLIC_NETWORK_SHORT_NAME: "${CURRENCY_SYMBOL}"
      NEXT_PUBLIC_NETWORK_ID: "${CHAIN_ID}"
      NEXT_PUBLIC_NETWORK_CURRENCY_NAME: "${CURRENCY_NAME}"
      NEXT_PUBLIC_NETWORK_CURRENCY_SYMBOL: "${CURRENCY_SYMBOL}"
      NEXT_PUBLIC_NETWORK_CURRENCY_DECIMALS: "${CURRENCY_DECIMALS:-18}"
      NEXT_PUBLIC_API_BASE_PATH: "/"
      NEXT_PUBLIC_APP_HOST: "${BASE_DOMAIN}"
      NEXT_PUBLIC_APP_PROTOCOL: "https"
      NEXT_PUBLIC_HOMEPAGE_CHARTS: "['daily_txs']"
      NEXT_PUBLIC_IS_TESTNET: "true"
      NEXT_PUBLIC_API_WEBSOCKET_PROTOCOL: "wss"
      NEXT_PUBLIC_API_SPEC_URL: "https://raw.githubusercontent.com/blockscout/blockscout-api-v2-swagger/main/swagger.yaml"
      NEXT_PUBLIC_NETWORK_RPC_URL: "${RPC_URL}"
    volumes:
      - ./logs:/app/logs
      - ./dets:/app/dets
    depends_on:
      - db
      - redis-db
    links:
      - db:database

  frontend:
    image: ghcr.io/blockscout/frontend:${FRONTEND_DOCKER_TAG:-latest}
    pull_policy: always
    platform: linux/amd64
    restart: always
    container_name: "blockscout-frontend"
    environment:
      NEXT_PUBLIC_API_HOST: "${BASE_DOMAIN}"
      NEXT_PUBLIC_API_PROTOCOL: "https"
      NEXT_PUBLIC_NETWORK_NAME: "${CURRENCY_NAME}"
      NEXT_PUBLIC_NETWORK_SHORT_NAME: "${CURRENCY_SYMBOL}"
      NEXT_PUBLIC_NETWORK_ID: "${CHAIN_ID}"
      NEXT_PUBLIC_NETWORK_CURRENCY_NAME: "${CURRENCY_NAME}"
      NEXT_PUBLIC_NETWORK_CURRENCY_SYMBOL: "${CURRENCY_SYMBOL}"
      NEXT_PUBLIC_NETWORK_CURRENCY_DECIMALS: "${CURRENCY_DECIMALS:-18}"
      NEXT_PUBLIC_API_BASE_PATH: "/"
      NEXT_PUBLIC_APP_HOST: "${BASE_DOMAIN}"
      NEXT_PUBLIC_APP_PROTOCOL: "https"
      NEXT_PUBLIC_HOMEPAGE_CHARTS: "['daily_txs']"
      NEXT_PUBLIC_IS_TESTNET: "true"
      NEXT_PUBLIC_API_WEBSOCKET_PROTOCOL: "wss"
      NEXT_PUBLIC_API_SPEC_URL: "https://raw.githubusercontent.com/blockscout/blockscout-api-v2-swagger/main/swagger.yaml"
      NEXT_PUBLIC_NETWORK_RPC_URL: "${RPC_URL}"
    depends_on:
      - backend

  proxy:
    image: nginx
    container_name: blockscout-proxy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      BACK_PROXY_PASS: "${BACK_PROXY_PASS:-http://backend:4000}"
      FRONT_PROXY_PASS: "${FRONT_PROXY_PASS:-http://frontend:3000}"
    volumes:
      - ./proxy/explorer.conf.template:/etc/nginx/templates/default.conf.template
    ports:
      - "127.0.0.1:${BLOCKSCOUT_PORT:-4000}:80"
    depends_on:
      - backend
      - frontend
