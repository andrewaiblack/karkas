
services:
  redis-db:
    image: "redis:alpine"
    container_name: blockscout-redis
    command: redis-server
    volumes:
      - ./redis-data:/data

  db-init:
    image: postgres:17
    volumes:
      - ./blockscout-db-data:/var/lib/postgresql/data
    entrypoint:
      - sh
      - -c
      - |
        chown -R 2000:2000 /var/lib/postgresql/data

  db:
    image: postgres:17
    user: 2000:2000
    shm_size: 256m
    restart: always
    container_name: "blockscout-db"
    command: postgres -c 'max_connections=200' -c 'client_connection_check_interval=60000'
    environment:
      POSTGRES_DB: "blockscout"
      POSTGRES_USER: "blockscout"
      POSTGRES_PASSWORD: "${BLOCKSCOUT_DB_PASSWORD:-ceWb1MeLBEeOIfk65gU8EjF8}"
    volumes:
      - ./blockscout-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blockscout -d blockscout"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      db-init:
        condition: service_completed_successfully

  backend:
    image: ghcr.io/blockscout/${DOCKER_REPO:-blockscout}:${DOCKER_TAG:-latest}
    pull_policy: always
    restart: always
    stop_grace_period: 5m
    container_name: "blockscout-backend"
    command: sh -c "bin/blockscout eval \"Elixir.Explorer.ReleaseTasks.create_and_migrate()\" && bin/blockscout start"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./envs/common-blockscout.env
    volumes:
      - ./logs:/app/logs
      - ./dets:/app/dets
    depends_on:
      - db
      - redis-db
    links:
      - db:database

  frontend:
    image: ghcr.io/blockscout/frontend:${FRONTEND_DOCKER_TAG:-latest}
    pull_policy: always
    platform: linux/amd64
    restart: always
    container_name: "blockscout-frontend"
    env_file:
      - ./envs/common-frontend.env
    depends_on:
      - backend

  proxy:
    image: nginx
    container_name: blockscout-proxy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      BACK_PROXY_PASS: ${BACK_PROXY_PASS:-http://backend:4000}
      FRONT_PROXY_PASS: ${FRONT_PROXY_PASS:-http://frontend:3000}
    volumes:
      - ./proxy/explorer.conf.template:/etc/nginx/templates/default.conf.template
    ports:
      - "4000:80"
    depends_on:
      - backend
      - frontend
